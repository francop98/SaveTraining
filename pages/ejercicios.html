<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8" />

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>Ejercicios</title>

<link
  href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap"
  rel="stylesheet"
/>

<link rel="stylesheet" href="../styles.css">

<style>

.exercise-listing {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.exercise-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
}

.exercise-name {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
}

.exercise-category {
  margin-top: 4px;
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.empty-exercises {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
  font-size: 14px;
}

.create-btn {
  width: 100%;
  margin-top: 18px;
}

#createForm {
  display: none;
  margin-top: 20px;
  border-top: 1px solid var(--border);
  padding-top: 20px;
}

.card-action {
  padding: 24px 20px;
  text-align: center;
}

.btn-large {
  width: 100%;
  padding: 18px 20px;
  font-size: 16px;
  border-radius: 16px;
}

.btn-full {
  width: 100%;
  padding: 14px 20px;
  border-radius: 14px;
}

#exerciseContainer {
  transition: max-height 0.25s ease;
}

.set-row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 8px;
  padding: 8px;
  background: var(--surface);
  border-radius: 8px;
}

.set-label {
  font-weight: 600;
  font-size: 12px;
  min-width: 30px;
  color: var(--text-muted);
}

.set-row input {
  flex: 1;
  padding: 6px 8px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface2);
  color: var(--text);
}

.btn-remove-set {
  background: transparent;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  padding: 4px;
  display: flex;
  align-items: center;
}

.btn-add-set {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  background: var(--primary);
  color: var(--text-on-primary);
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 500;
}

.set-chip {
  background: var(--surface);
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 12px;
  display: inline-block;
  margin-right: 8px;
  margin-bottom: 8px;
}

.set-num {
  font-weight: 600;
  color: var(--primary);
}

.set-data {
  color: var(--text-muted);
  font-size: 11px;
}

</style>

</head>

<body>

<nav class="navbar">

  <a href="../index.html" class="nav-link">
    ← Inicio
  </a>

</nav>

<div class="app">

<header>

  <div class="logo">
    MIS<span><br>EJERCICIOS</span>
  </div>

</header>

<div class="card card-action">
  <button
    class="btn btn-primary btn-large"
    id="toggleCreateBtn"
  >
    + AÑADIR NUEVO EJERCICIO
  </button>

  <div id="createForm">

    <div class="form-group">
      <label>Nombre del ejercicio</label>
      <input
        type="text"
        id="exName"
        placeholder="Ej: Press banca"
      />
    </div>

    <div class="form-group">
      <label>Categoría</label>
      <select id="exCategory">
        <option value="Pecho">Pecho</option>
        <option value="Espalda">Espalda</option>
        <option value="Piernas">Piernas</option>
        <option value="Hombros">Hombros</option>
        <option value="Bíceps">Bíceps</option>
        <option value="Tríceps">Tríceps</option>
        <option value="Core">Core</option>
        <option value="Cardio">Cardio</option>
        <option value="Otro">Otro</option>
      </select>
    </div>

    <div class="form-group">
      <label>Series (Reps x Kg)</label>
      <div class="sets-builder" id="setsBuilder"></div>
      <button
        type="button"
        class="btn-add-set"
        id="addSetBtn"
      >
        + Añadir serie
      </button>
    </div>

    <button
      class="btn btn-primary"
      id="saveExerciseBtn"
    >
      GUARDAR EJERCICIO
    </button>

  </div>
</div>

<div class="card">
  <button class="btn btn-secondary btn-full" id="toggleListBtn">
    EJERCICIOS REGISTRADOS
  </button>
  <div id="exerciseContainer" style="display:none; margin-top:16px;">
    <div class="exercise-listing" id="exerciseListing"></div>
  </div>
</div>

</div>

<script>

var STORAGE_KEY = 'savetraining_v1';

var data = JSON.parse(
  localStorage.getItem(STORAGE_KEY) || '{}'
);

var addSets = [];

var TRASH_SVG =
  '<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
    '<polyline points="3 6 5 6 21 6"/>' +
    '<path d="M19 6l-1 14H6L5 6"/>' +
    '<path d="M10 11v6"/>' +
    '<path d="M14 11v6"/>' +
    '<path d="M9 6V4h6v2"/>' +
  '</svg>';

function buildSetRow(set, i, isFirst) {
  var row = document.createElement('div');
  row.className = 'set-row' + (isFirst ? ' no-repeat' : '');
  row.innerHTML =
    '<span class="set-label">S' + (i + 1) + '</span>' +
    '<input type="number" placeholder="Reps" min="1" value="' + (set.reps || '') + '" data-idx="' + i + '" data-field="reps"/>' +
    '<input type="number" placeholder="Peso kg" min="0" step="0.5" value="' + (set.weight || '') + '" data-idx="' + i + '" data-field="weight"/>' +
    '<button class="btn-remove-set" data-idx="' + i + '" title="Eliminar serie">' + TRASH_SVG + '</button>';
  return row;
}

function bindSetEvents(container, setsArr, rerenderFn) {
  container.querySelectorAll('input').forEach(function (inp) {
    inp.addEventListener('input', function (e) {
      setsArr[parseInt(e.target.dataset.idx)][e.target.dataset.field] = e.target.value;
    });
  });
  container.querySelectorAll('.btn-remove-set').forEach(function (btn) {
    btn.addEventListener('click', function (e) {
      setsArr.splice(parseInt(e.currentTarget.dataset.idx), 1);
      rerenderFn();
    });
  });
}

function renderAddSets() {
  var container = document.getElementById('setsBuilder');
  container.innerHTML = '';
  addSets.forEach(function (set, i) { container.appendChild(buildSetRow(set, i, i === 0)); });
  bindSetEvents(container, addSets, renderAddSets);
}

document.getElementById('addSetBtn').addEventListener('click', function () {
  addSets.push({ reps: '', weight: '' });
  renderAddSets();
});

function getUniqueExercises() {

  var map = {};

  Object.keys(data).forEach(function(dateKey) {

    var day = data[dateKey];

    if (!day.exercises) return;

    day.exercises.forEach(function(ex) {

      var key = ex.name.trim().toLowerCase();

      if (!key) return;

      if (!map[key]) {

        map[key] = {
          name: ex.name,
          category: ex.category || 'Otro',
          sets: ex.sets || []
        };

      }

    });

  });

  return Object.values(map);

}

function renderExercises() {

  var exercises = getUniqueExercises();

  var container =
    document.getElementById('exerciseListing');

  container.innerHTML = '';

  if (exercises.length === 0) {

    container.innerHTML =

      '<div class="empty-exercises">' +
      'Todavía no registraste ejercicios.' +
      '</div>';

    return;

  }

  exercises.sort(function(a, b) {

    return a.name.localeCompare(b.name);

  });

  exercises.forEach(function(ex) {

    var div = document.createElement('div');

    div.className = 'exercise-card';

    var setsHtml = '';
    if (ex.sets && ex.sets.length > 0) {
      setsHtml = '<div style="margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px;">';
      ex.sets.forEach(function(set, i) {
        setsHtml += '<div class="set-chip">' +
          '<div class="set-num">S' + (i + 1) + '</div>' +
          '<div class="set-data">' + set.reps + ' reps × ' + set.weight + 'kg</div>' +
          '</div>';
      });
      setsHtml += '</div>';
    }

    div.innerHTML =

      '<div class="exercise-name">' +
      ex.name +
      '</div>' +

      '<div class="exercise-category">' +
      ex.category +
      '</div>' +
      setsHtml;

    container.appendChild(div);

  });

}

document
  .getElementById('toggleCreateBtn')
  .addEventListener('click', function() {

    var form =
      document.getElementById('createForm');

    form.style.display =
      form.style.display === 'block'
        ? 'none'
        : 'block';

    if (form.style.display === 'block') {
      document.getElementById('exName').value = '';
      document.getElementById('exCategory').value = 'Otro';
      addSets = [];
      renderAddSets();
    }

  });

document
  .getElementById('toggleListBtn')
  .addEventListener('click', function() {

    var container = document.getElementById('exerciseContainer');
    container.style.display =
      container.style.display === 'block'
        ? 'none'
        : 'block';

  });

document
  .getElementById('saveExerciseBtn')
  .addEventListener('click', function() {

    var name =
      document.getElementById('exName')
      .value
      .trim();

    if (!name) return;

    var category =
      document.getElementById('exCategory')
      .value;

    var validSets = addSets.filter(function (s) { return s.reps || s.weight; });

    if (!data['ejercicios']) {

      data['ejercicios'] = {
        exercises: []
      };

    }

    data['ejercicios'].exercises.push({

      name: name,

      category: category,

      sets: validSets.map(function (s) { return { reps: s.reps || '', weight: s.weight || '' }; }),

      notes: ''

    });

    localStorage.setItem(
      STORAGE_KEY,
      JSON.stringify(data)
    );

    document.getElementById('exName').value = '';
    document.getElementById('exCategory').value = 'Otro';
    addSets = [];
    renderAddSets();

    var form = document.getElementById('createForm');
    form.style.display = 'none';

    renderExercises();

  });

renderExercises();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8" />

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>Ejercicios</title>

<link
  href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap"
  rel="stylesheet"
/>

<link rel="stylesheet" href="../styles.css">

<style>

.exercise-listing {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.exercise-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
}

.exercise-name {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
}

.exercise-category {
  margin-top: 4px;
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.empty-exercises {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
  font-size: 14px;
}

.create-btn {
  width: 100%;
  margin-top: 18px;
}

#createForm {
  display: none;
  margin-top: 20px;
  border-top: 1px solid var(--border);
  padding-top: 20px;
}

.card-action {
  padding: 24px 20px;
  text-align: center;
}

.btn-large {
  width: 100%;
  padding: 18px 20px;
  font-size: 16px;
  border-radius: 16px;
}

.btn-full {
  width: 100%;
  padding: 14px 20px;
  border-radius: 14px;
}

#exerciseContainer {
  transition: max-height 0.25s ease;
}

.exercise-card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
}

.exercise-card-actions {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}

.set-chip {
  background: var(--surface);
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 12px;
  display: inline-block;
  margin-right: 8px;
  margin-bottom: 8px;
}

.set-num {
  font-weight: 600;
  color: var(--primary);
}

.set-data {
  color: var(--text-muted);
  font-size: 11px;
}

/* Cards de categoría (nivel 1) */
.cat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
}

.cat-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px 14px;
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
}

.cat-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
}

.cat-card-nombre {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  letter-spacing: 1.5px;
  color: var(--text);
}

.cat-card-count {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
}

/* Botón volver (nivel 2) */
.btn-volver-cat {
  background: transparent;
  border: none;
  color: var(--accent);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  padding: 0;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.btn-volver-cat:hover { color: var(--text); }

.cat-actual-titulo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 1.5px;
  color: var(--text);
  margin-bottom: 12px;
}

</style>

</head>

<body>

<nav class="navbar">

  <a href="../index.html" class="nav-link">
    ← Inicio
  </a>

</nav>

<div class="app">

<header>

  <div class="logo">
    MIS<span><br>EJERCICIOS</span>
  </div>

</header>

<div class="card card-action">
  <button
    class="btn btn-primary btn-large"
    id="toggleCreateBtn"
  >
    + AÑADIR NUEVO EJERCICIO
  </button>

  <div id="createForm">

    <div class="section-title" id="formTitulo">Añadir Ejercicio</div>

    <div class="form-group"><label>Nombre</label><input type="text" id="exName" placeholder="Ej: Press banca..."/></div>
    <div class="form-group"><label>Categoría</label>
      <select id="exCategory">
        <option>Pecho</option><option>Espalda</option><option>Piernas</option>
        <option>Hombros</option><option>Bíceps</option><option>Tríceps</option>
        <option>Core</option><option>Cardio</option><option>Otro</option>
      </select>
    </div>
    <div class="form-group"><label>Series</label><div class="sets-builder" id="setsBuilder"></div><button class="btn-add-set" id="addSetBtn">+ Añadir serie</button></div>
    <div class="form-group"><label>Notas (opcional)</label><input type="text" id="exNotes" placeholder="Ej: Agarre ancho..."/></div>
    <button class="btn btn-primary" id="saveExerciseBtn">GUARDAR EJERCICIO</button>

  </div>
</div>

<div class="card">
  <button class="btn btn-secondary btn-full" id="toggleListBtn">
    EJERCICIOS REGISTRADOS
  </button>
  <div id="exerciseContainer" style="display:none; margin-top:16px;">
    <div id="vistaCategorias">
      <div class="cat-grid" id="catGrid"></div>
    </div>
    <div id="vistaEjercicios" style="display:none;">
      <button class="btn-volver-cat" id="btnVolverCat">← Volver a grupos musculares</button>
      <div class="cat-actual-titulo" id="catActualTitulo"></div>
      <div class="exercise-listing" id="exerciseListing"></div>
    </div>
  </div>
</div>

</div>

<div class="toast" id="toast"></div>

<script>

var STORAGE_KEY = 'savetraining_v1';
var OCULTOS_KEY = 'savetraining_ejercicios_ocultos';

var data = JSON.parse(
  localStorage.getItem(STORAGE_KEY) || '{}'
);

var ocultos = JSON.parse(
  localStorage.getItem(OCULTOS_KEY) || '[]'
);

var categoriaActiva = null; // null = todas
var editandoNombreOriginal = null; // si no es null, estamos editando ese ejercicio

var CATEGORIAS_ORDEN = ['Pecho','Espalda','Piernas','Hombros','Bíceps','Tríceps','Core','Cardio','Otro'];

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

var TRASH_SVG_CARD =
  '<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>';

var EDIT_SVG =
  '<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';

function saveOcultos() {
  localStorage.setItem(OCULTOS_KEY, JSON.stringify(ocultos));
}

function getUniqueExercises() {

  var map = {};

  Object.keys(data).forEach(function(dateKey) {

    var day = data[dateKey];

    if (!day.exercises) return;

    day.exercises.forEach(function(ex) {

      var key = ex.name.trim().toLowerCase();

      if (!key) return;
      if (ocultos.indexOf(key) !== -1) return;

      if (!map[key]) {

        map[key] = {
          name: ex.name,
          category: ex.category || 'Otro',
          sets: ex.sets || [],
          notes: ex.notes || ''
        };

      }

    });

  });

  return Object.values(map);

}

function renderCatGrid(exercises) {

  var grid = document.getElementById('catGrid');
  grid.innerHTML = '';

  var counts = {};
  exercises.forEach(function(ex) {
    var cat = ex.category || 'Otro';
    counts[cat] = (counts[cat] || 0) + 1;
  });

  var categoriasPresentes = CATEGORIAS_ORDEN.filter(function(c) { return counts[c]; });

  if (categoriasPresentes.length === 0) {
    grid.innerHTML = '<div class="empty-exercises">Todavía no registraste ejercicios.</div>';
    return;
  }

  categoriasPresentes.forEach(function(cat) {
    var card = document.createElement('div');
    card.className = 'cat-card';
    card.innerHTML =
      '<div class="cat-card-nombre">' + cat + '</div>' +
      '<div class="cat-card-count">' + counts[cat] + ' ejercicio(s)</div>';
    card.addEventListener('click', function() {
      categoriaActiva = cat;
      mostrarVistaEjercicios();
    });
    grid.appendChild(card);
  });

}

function mostrarVistaEjercicios() {
  document.getElementById('vistaCategorias').style.display = 'none';
  document.getElementById('vistaEjercicios').style.display = 'block';
  document.getElementById('catActualTitulo').textContent = categoriaActiva;
  renderExercisesList();
}

function mostrarVistaCategorias() {
  categoriaActiva = null;
  document.getElementById('vistaEjercicios').style.display = 'none';
  document.getElementById('vistaCategorias').style.display = 'block';
  renderCatGrid(getUniqueExercises());
}

document.getElementById('btnVolverCat').addEventListener('click', mostrarVistaCategorias);

function renderExercisesList() {

  var exercises = getUniqueExercises();

  var container =
    document.getElementById('exerciseListing');

  container.innerHTML = '';

  var visibles = exercises.filter(function(ex) { return (ex.category || 'Otro') === categoriaActiva; });

  if (visibles.length === 0) {

    container.innerHTML =

      '<div class="empty-exercises">' +
      'No hay ejercicios en esta categoría.' +
      '</div>';

    return;

  }

  visibles.sort(function(a, b) {

    return a.name.localeCompare(b.name);

  });

  visibles.forEach(function(ex) {

    var div = document.createElement('div');

    div.className = 'exercise-card';

    var setsHtml = '';
    if (ex.sets && ex.sets.length > 0) {
      setsHtml = '<div style="margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px;">';
      ex.sets.forEach(function(set, i) {
        setsHtml += '<div class="set-chip">' +
          '<div class="set-num">S' + (i + 1) + '</div>' +
          '<div class="set-data">' + set.reps + ' reps × ' + set.weight + 'kg</div>' +
          '</div>';
      });
      setsHtml += '</div>';
    }

    div.innerHTML =

      '<div class="exercise-card-header">' +
        '<div>' +
          '<div class="exercise-name">' + ex.name + '</div>' +
          '<div class="exercise-category">' + ex.category + '</div>' +
        '</div>' +
        '<div class="exercise-card-actions">' +
          '<button class="btn btn-sm btn-edit" title="Editar ejercicio">' + EDIT_SVG + '</button>' +
          '<button class="btn btn-sm btn-danger" title="Eliminar ejercicio">' + TRASH_SVG_CARD + '</button>' +
        '</div>' +
      '</div>' +
      setsHtml +
      (ex.notes ? '<div style="font-size:12px;color:var(--text-muted);margin-top:6px">📝 ' + ex.notes + '</div>' : '');

    div.querySelector('.btn-edit').addEventListener('click', function() {
      abrirFormParaEditar(ex);
    });

    div.querySelector('.btn-danger').addEventListener('click', function() {
      if (!confirm('¿Eliminar "' + ex.name + '" de la lista de ejercicios?\n\nEsto no borra el historial de entrenamientos donde ya lo registraste.')) return;
      ocultos.push(ex.name.trim().toLowerCase());
      saveOcultos();
      renderExercisesList();
      showToast('Ejercicio eliminado de la lista');
    });

    container.appendChild(div);

  });

}

function renderExercises() {
  mostrarVistaCategorias();
}

document
  .getElementById('toggleListBtn')
  .addEventListener('click', function() {

    var container = document.getElementById('exerciseContainer');
    var abriendo = container.style.display !== 'block';
    container.style.display = abriendo ? 'block' : 'none';

    if (abriendo) {
      mostrarVistaCategorias();
    }

  });

/* ════════════════════════════════════════════
   AÑADIR EJERCICIO — copiado de modo libre
   (registrarEntrenamiento.html)
════════════════════════════════════════════ */

var addSets = [];
var TRASH = '<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>';

function renderSets() {
  var c = document.getElementById('setsBuilder'); c.innerHTML = '';
  addSets.forEach(function(s,i){
    var row = document.createElement('div');
    row.className = 'set-row' + (i===0?' no-repeat':'');
    row.innerHTML = '<span class="set-label">S'+(i+1)+'</span>' +
      '<input type="number" placeholder="Reps" value="'+(s.reps||'')+'" data-idx="'+i+'" data-field="reps"/>' +
      '<input type="number" placeholder="Peso kg" step="0.5" value="'+(s.weight||'')+'" data-idx="'+i+'" data-field="weight"/>' +
      (i>0?'<button class="btn-repeat-set" data-idx="'+i+'">↑ Repetir</button>':'') +
      '<button class="btn-remove-set" data-idx="'+i+'">'+TRASH+'</button>';
    c.appendChild(row);
  });
  c.querySelectorAll('input').forEach(function(inp){
    inp.addEventListener('input', function(e){ addSets[+e.target.dataset.idx][e.target.dataset.field]=e.target.value; });
  });
  c.querySelectorAll('.btn-remove-set').forEach(function(b){
    b.addEventListener('click', function(e){ addSets.splice(+e.currentTarget.dataset.idx,1); renderSets(); });
  });
  c.querySelectorAll('.btn-repeat-set').forEach(function(b){
    b.addEventListener('click', function(e){
      var idx=+e.currentTarget.dataset.idx; var p=addSets[idx-1];
      if(p){ addSets[idx]={reps:p.reps,weight:p.weight}; renderSets(); }
    });
  });
}

document.getElementById('addSetBtn').addEventListener('click', function(){ addSets.push({reps:'',weight:''}); renderSets(); });

document
  .getElementById('toggleCreateBtn')
  .addEventListener('click', function() {

    var form = document.getElementById('createForm');

    form.style.display = form.style.display === 'block' ? 'none' : 'block';

    if (form.style.display === 'block') {
      editandoNombreOriginal = null;
      document.getElementById('formTitulo').textContent = 'Añadir Ejercicio';
      document.getElementById('saveExerciseBtn').textContent = 'GUARDAR EJERCICIO';
      document.getElementById('exName').value = '';
      document.getElementById('exCategory').value = 'Pecho';
      document.getElementById('exNotes').value = '';
      addSets = [];
      renderSets();
    }

  });

function abrirFormParaEditar(ex) {
  editandoNombreOriginal = ex.name;

  document.getElementById('formTitulo').textContent = 'Editar Ejercicio';
  document.getElementById('saveExerciseBtn').textContent = 'GUARDAR CAMBIOS';

  document.getElementById('exName').value = ex.name;
  document.getElementById('exCategory').value = ex.category;
  document.getElementById('exNotes').value = ex.notes || '';

  addSets = (ex.sets || []).map(function(s){ return { reps: s.reps === '-' ? '' : s.reps, weight: s.weight === '0' ? '' : s.weight }; });
  renderSets();

  var form = document.getElementById('createForm');
  form.style.display = 'block';
  form.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

document.getElementById('saveExerciseBtn').addEventListener('click', function(){
  var name = document.getElementById('exName').value.trim();
  if (!name){ showToast('⚠ Ingresá el nombre'); return; }

  var valid = addSets.filter(function(s){ return s.reps||s.weight; });
  if (!valid.length){ showToast('⚠ Añadí al menos una serie'); return; }

  var category = document.getElementById('exCategory').value;
  var notes = document.getElementById('exNotes').value.trim();
  var lower = name.toLowerCase();

  if (editandoNombreOriginal) {
    // MODO EDICIÓN: ocultar el nombre original y guardar entrada nueva
    var keyOriginal = editandoNombreOriginal.trim().toLowerCase();

    // Si cambió el nombre, validar que el nuevo no exista como otro ejercicio
    if (lower !== keyOriginal) {
      var existentes = getUniqueExercises();
      var yaExiste = existentes.some(function(ex){ return ex.name.trim().toLowerCase() === lower; });
      if (yaExiste){ showToast('⚠ Ya existe un ejercicio con ese nombre'); return; }

      // Ocultar el nombre original
      if (ocultos.indexOf(keyOriginal) === -1) {
        ocultos.push(keyOriginal);
        saveOcultos();
      }
    }

    // Guardar versión editada en el catálogo
    if (!data['ejercicios']) data['ejercicios'] = { exercises: [] };
    // Si ya hay una entrada de catálogo con ese nombre, actualizarla; si no, crear
    var entradaCatalogo = data['ejercicios'].exercises.find(function(e){
      return e.name.trim().toLowerCase() === lower;
    });
    if (entradaCatalogo) {
      entradaCatalogo.name     = name;
      entradaCatalogo.category = category;
      entradaCatalogo.sets     = valid.map(function(s){ return {reps:s.reps||'-',weight:s.weight||'0'}; });
      entradaCatalogo.notes    = notes;
    } else {
      data['ejercicios'].exercises.push({
        name: name, category: category,
        sets: valid.map(function(s){ return {reps:s.reps||'-',weight:s.weight||'0'}; }),
        notes: notes
      });
    }

    editandoNombreOriginal = null;
    showToast('✓ Ejercicio actualizado');

  } else {
    // MODO CREACIÓN: validar duplicado
    var existentes = getUniqueExercises();
    var yaExiste = existentes.some(function(ex){ return ex.name.trim().toLowerCase() === lower; });
    if (yaExiste){ showToast('⚠ Ya existe este ejercicio registrado'); return; }

    if (!data['ejercicios']) data['ejercicios'] = { exercises: [] };
    data['ejercicios'].exercises.push({
      name: name, category: category,
      sets: valid.map(function(s){ return {reps:s.reps||'-',weight:s.weight||'0'}; }),
      notes: notes
    });

    showToast('✓ Ejercicio guardado');
  }

  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));

  document.getElementById('exName').value='';
  document.getElementById('exNotes').value='';
  document.getElementById('formTitulo').textContent = 'Añadir Ejercicio';
  document.getElementById('saveExerciseBtn').textContent = 'GUARDAR EJERCICIO';
  addSets=[]; renderSets();

  document.getElementById('createForm').style.display = 'none';
  mostrarVistaCategorias();
});

renderExercises();

</script>

</body>
</html>

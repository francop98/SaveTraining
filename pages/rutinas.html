<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rutinas</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles.css">
  <style>
    /* Superserie builder */
    .superserie-wrapper {
      border: 1px solid rgba(168,85,247,0.3);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      background: rgba(168,85,247,0.04);
    }
    .superserie-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #c084fc;
      font-weight: 700;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .ejercicio-builder-row {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .ejercicio-builder-row:last-child { margin-bottom: 0; }
    .ejercicio-builder-row.en-superserie {
      border-color: rgba(168,85,247,0.2);
      margin-bottom: 8px;
    }
    .superserie-wrapper .ejercicio-builder-row + .ejercicio-builder-row::before {
      content: '⚡';
      display: block;
      text-align: center;
      font-size: 14px;
      margin-bottom: 8px;
      opacity: 0.6;
    }
    .btn-superserie {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: transparent;
      border: 1px dashed rgba(107,107,122,0.5);
      color: var(--text-muted);
      border-radius: 6px;
      padding: 4px 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-superserie:hover { border-color:#c084fc; color:#c084fc; background:rgba(168,85,247,0.08); }
    .btn-superserie.activo { border-color:rgba(168,85,247,0.5); color:#c084fc; background:rgba(168,85,247,0.1); border-style:solid; }
    .btn-superserie.activo:hover { background:rgba(168,85,247,0.18); }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="../index.html" class="nav-link">← Inicio</a>
</nav>

<div class="app">
  <header>
    <div class="logo">MIS<span><br>RUTINAS</span></div>
  </header>

  <div class="card" style="margin-bottom:20px">
    <div class="section-title" id="formTitle">Crear Rutina</div>

    <div class="form-group">
      <label>Nombre de la rutina</label>
      <input type="text" id="rutinaName" placeholder="Ej: Día de pecho, Full body..."/>
    </div>

    <div class="form-group">
      <label>Ejercicios</label>
      <div id="ejerciciosRutina"></div>
      <button class="btn-add-set" id="addEjercicioBtn" style="margin-top:8px">+ Añadir ejercicio</button>
    </div>

    <div style="display:flex;gap:10px;margin-top:4px">
      <button class="btn btn-secondary" id="cancelEditBtn" style="display:none;flex:1">Cancelar</button>
      <button class="btn btn-primary" id="saveRutinaBtn" style="flex:2;margin-top:0">GUARDAR RUTINA</button>
    </div>
  </div>

  <div id="rutinasList"></div>
</div>

<div class="toast" id="toast"></div>

<script src="../rutinas.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Inicio</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="./styles.css">
</head>
<body>

<div class="app">
<header>
    <div class="logo">REGISTRO DE<span><br>ENTRENAMIENTO</span></div>
    <div class="header-stat">
    <div class="count" id="totalDays">0</div>
    <div class="label-dias-entrenados">Días entrenados <br>en el año</div>
    </div>
</header>

<div class="stats-bar">
  <a href="pages/datos.html" style="text-decoration:none">
    <div class="stat-pill">
      <div class="val">📊</div>
      <div class="lbl">Datos</div>
    </div>
  </a>
  <a href="pages/rutinas.html" style="text-decoration:none">
    <div class="stat-pill">
      <div class="val">💪</div>
      <div class="lbl">Rutinas</div>
    </div>
  </a>
  <a href="pages/ejercicios.html" style="text-decoration:none">
    <div class="stat-pill">
      <div class="val">🏋️</div>
      <div class="lbl">Ejercicios</div>
    </div>
  </a>
</div>

<div class="grid">
    <div class="card" id="cardFecha">
        <div class="section-title">Clickear para registrar entrenamiento</div>
        <div class="cal-grid" id="calGrid"></div>
    </div>
</div>

<a href="pages/historialEntrenamientos.html" style="text-decoration:none">
  <div class="stat-pill card-full" style="margin-top:20px">
    <div class="val">📋</div>
    <div class="lbl">Historial</div>
  </div>
</a>

</div>

<!-- MODAL EDITAR -->
<div class="modal-overlay" id="editModal">
<div class="modal">
    <div class="modal-title">EDITAR EJERCICIO</div>
    <div class="form-group">
    <label>Nombre</label>
    <input type="text" id="editName"/>
    </div>
    <div class="form-group">
    <label>Categoría</label>
    <select id="editCategory">
        <option value="Pecho">Pecho</option>
        <option value="Espalda">Espalda</option>
        <option value="Piernas">Piernas</option>
        <option value="Hombros">Hombros</option>
        <option value="Bíceps">Bíceps</option>
        <option value="Tríceps">Tríceps</option>
        <option value="Otro">Otro</option>
    </select>
    </div>
    <div class="form-group">
    <label>Series</label>
    <div class="sets-builder" id="editSetsBuilder"></div>
    <button class="btn-add-set" id="editAddSetBtn">+ Añadir serie</button>
    </div>
    <div class="form-group">
    <label>Notas</label>
    <input type="text" id="editNotes"/>
    </div>
    <div class="modal-actions">
    <button class="btn btn-secondary" id="cancelEdit">Cancelar</button>
    <button class="btn btn-primary" style="flex:2" id="confirmEdit">GUARDAR CAMBIOS</button>
    </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script src="./main.js"></script>
</body>
</html>
